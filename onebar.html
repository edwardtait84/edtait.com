<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Scrolling Score (Image Bars)</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    #controls {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button, input {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    #scoreContainer {
      position: absolute;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    #score {
      display: flex;
      align-items: center;
      height: 100%;
      transform: translateX(0px);
    }

    .bar {
      height: 70%;
      margin: 0 10px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      overflow: hidden;
    }

    .bar img {
      height: 100%;
      display: block;
    }

    .placeholder {
      width: 120px;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        #000,
        #000 2px,
        #fff 2px,
        #fff 14px
      );
    }
  </style>
</head>
<body>

<div id="controls">
  <button onclick="startScroll()">Start</button>
  <button onclick="stopScroll()">Stop</button>
  <input type="file" id="upload" accept="image/*" multiple>
</div>

<div id="scoreContainer">
  <div id="score"></div>
</div>

<script>
  const score = document.getElementById('score');
  const upload = document.getElementById('upload');

  let scrollSpeed = 0.5;
  let scrolling = false;
  let offset = 0;

  // Add placeholder bars initially
  function addPlaceholderBars(count = 10) {
    for (let i = 0; i < count; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';

      const placeholder = document.createElement('div');
      placeholder.className = 'placeholder';

      bar.appendChild(placeholder);
      score.appendChild(bar);
    }
  }

  addPlaceholderBars();

  // Handle image upload (each image = one bar)
  upload.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);

    files.forEach(file => {
      const reader = new FileReader();

      reader.onload = function(event) {
        const bar = document.createElement('div');
        bar.className = 'bar';

        const img = document.createElement('img');
        img.src = event.target.result;

        bar.appendChild(img);
        score.appendChild(bar);
      };

      reader.readAsDataURL(file);
    });
  });

  function animate() {
    if (scrolling) {
      offset -= scrollSpeed;
      score.style.transform = `translateX(${offset}px)`;
    }
    requestAnimationFrame(animate);
  }

  function startScroll() {
    scrolling = true;
  }

  function stopScroll() {
    scrolling = false;
  }

  animate();
</script>

</body>
</html>
