<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embedded Scrolling Score</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
    }

    #controls {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    #score {
      display: flex;
      align-items: center;
      height: 80%;
    }

    .bar {
      height: 100%;
      margin-right: 2px;
      background: white;
      display: flex;
      align-items: center;
    }

    .bar img {
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

<div id="controls">
  <button onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>
</div>

<div id="container">
  <div id="score"></div>
</div>

<script>
  const score = document.getElementById('score');

  // === EMBED YOUR BAR IMAGES HERE ===
  // Replace these with your own image paths (or base64 data)
  const bars = [
    "bars/bar1.png",
    "bars/bar2.png",
    "bars/bar3.png",
    "bars/bar4.png"
  ];

  // Build score from embedded images
  bars.forEach(src => {
    const bar = document.createElement('div');
    bar.className = 'bar';

    const img = document.createElement('img');
    img.src = src;

    bar.appendChild(img);
    score.appendChild(bar);
  });

  let scrolling = false;
  let offset = 0;
  let speed = 0.5;

  function animate() {
    if (scrolling) {
      offset -= speed;
      score.style.transform = `translateX(${offset}px)`;
    }
    requestAnimationFrame(animate);
  }

  function start() { scrolling = true; }
  function stop() { scrolling = false; }

  animate();
</script>

</body>
</html>
