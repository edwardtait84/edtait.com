<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synced Scrolling Score</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
    }

    #controls {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    #score {
      display: flex;
      align-items: center;
      height: 80%;
    }

    .bar {
      height: 100%;
      margin-right: 2px;
      background: white;
      display: flex;
      align-items: center;
    }

    .bar img {
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

<div id="controls">
  <button onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>
</div>

<div id="container">
  <div id="score"></div>
</div>

<!-- === ADD YOUR AUDIO FILE HERE === -->
<audio id="audio" src="audio/recording.mp3"></audio>

<script>
  const score = document.getElementById('score');
  const audio = document.getElementById('audio');

  // === EMBED YOUR BAR IMAGES HERE ===
  const bars = [
    "bars/bar1.png",
    "bars/bar2.png",
    "bars/bar3.png",
    "bars/bar4.png"
  ];

  // Build score
  bars.forEach(src => {
    const bar = document.createElement('div');
    bar.className = 'bar';

    const img = document.createElement('img');
    img.src = src;

    bar.appendChild(img);
    score.appendChild(bar);
  });

  let scrolling = false;
  let offset = 0;

  // === SPEED SETTINGS ===
  // 2 bars every 7 seconds
  let pixelsPerSecond = 0;

  function calculateSpeed() {
    const firstBar = document.querySelector('.bar');
    if (!firstBar) return;

    const barWidth = firstBar.offsetWidth;

    // 2 bars per 7 seconds
    pixelsPerSecond = (2 * barWidth) / 7;
  }

  let lastTime = null;

  function animate(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const delta = (timestamp - lastTime) / 1000; // seconds
    lastTime = timestamp;

    if (scrolling) {
      offset -= pixelsPerSecond * delta;
      score.style.transform = `translateX(${offset}px)`;
    }

    requestAnimationFrame(animate);
  }

  function start() {
    calculateSpeed();
    scrolling = true;
    audio.currentTime = 0;
    audio.play();
  }

  function stop() {
    scrolling = false;
    audio.pause();
  }

  animate();
</script>

</body>
</html>
