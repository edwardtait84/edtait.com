<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cellist Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Times New Roman", serif;
  background: linear-gradient(135deg, #0b1a2a, #111);
  color: #f5f5f5;
}

header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  margin: 0;
}

nav {
  display: flex;
  gap: 25px;
}

nav a {
  color: #dcdcdc;
  text-decoration: none;
  font-size: 16px;
  position: relative;
}

nav a::after {
  content: "";
  position: absolute;
  width: 0;
  height: 1px;
  background: #9aa86a;
  left: 0;
  bottom: -4px;
  transition: 0.3s;
}

nav a:hover::after {
  width: 100%;
}

.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
}

.hamburger span {
  height: 3px;
  width: 25px;
  background: white;
  margin: 4px 0;
}

.section {
  padding: 60px 20px;
  max-width: 1000px;
  margin: auto;
}

h2 {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  margin-bottom: 30px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding-bottom: 10px;
}

.bio-container {
  display: flex;
  gap: 40px;
  align-items: center;
}

.bio-container img {
  width: 280px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.bio-text {
  flex: 1;
  line-height: 1.7;
  font-size: 17px;
}

.calendar-item {
  display: flex;
  align-items: center;
  margin-bottom: 25px;
  padding: 15px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}

.date-box {
  width: 75px;
  height: 75px;
  background: #1f2f1f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-right: 20px;
  border-radius: 10px;
}

.contact a {
  display: inline-block;
  margin-right: 15px;
  color: #9aa86a;
  text-decoration: none;
}

.cv-upload {
  border: 1px dashed rgba(255,255,255,0.3);
  padding: 30px;
  text-align: center;
  border-radius: 10px;
}

/* Mobile styles */
@media (max-width: 768px) {
  nav {
    position: absolute;
    top: 70px;
    right: 20px;
    background: rgba(0,0,0,0.9);
    flex-direction: column;
    padding: 20px;
    border-radius: 10px;
    display: none;
  }

  nav.active {
    display: flex;
  }

  .hamburger {
    display: flex;
  }

  .bio-container {
    flex-direction: column;
  }

  .bio-container img {
    width: 100%;
  }
}
</style>
</head>
<body>

<header>
  <h1>Cellist Name</h1>

  <div class="hamburger" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <nav id="navMenu">
    <a href="#bio">Biography</a>
    <a href="#upcoming">Upcoming</a>
    <a href="#past">Past</a>
    <a href="#contact">Contact</a>
    <a href="#cv">CV</a>
  </nav>
</header>

<section id="bio" class="section">
  <h2>Biography</h2>
  <div class="bio-container">
    <img src="https://via.placeholder.com/300" alt="Cellist Photo">
    <div class="bio-text">
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      <p>Praesent tincidunt, nisl eget tincidunt gravida.</p>
    </div>
  </div>
</section>

<section id="upcoming" class="section">
  <h2>Upcoming Concerts</h2>
  <div class="calendar-item">
    <div class="date-box"><span>12</span><span>May</span></div>
    <div><h3>Recital</h3><p>London</p></div>
  </div>
</section>

<section id="past" class="section">
  <h2>Past Events</h2>
  <div class="calendar-item">
    <div class="date-box"><span>10</span><span>Jan</span></div>
    <div><h3>Performance</h3><p>Manchester</p></div>
  </div>
</section>

<section id="contact" class="section contact">
  <h2>Contact</h2>
  <a href="#">Email</a>
  <a href="#">Instagram</a>
</section>

<section id="cv" class="section">
  <h2>CV</h2>
  <div class="cv-upload">
    <input type="file">
  </div>
</section>

<script>
function toggleMenu() {
  const menu = document.getElementById('navMenu');
  menu.classList.toggle('active');
}
</script>

</body>
</html>
