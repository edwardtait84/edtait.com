<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul Crossley - Concert Pianist</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Georgia, serif;
        background-color: #444;
        color: #fff;
    }

    /* Site Title */
    .site-title {
        background: #fff;
        color: #000;
        font-size: 32px;
        padding: 20px 30px;
        text-align: left;
    }

    /* Navigation */
    nav {
        background: #000;
        width: 100%;
    }

    nav ul {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
    }

    nav li {
        margin: 0;
    }

    nav a {
        display: block;
        color: #fff;
        text-decoration: none;
        padding: 14px 18px;
        transition: all 0.2s ease;
    }

    nav a:hover {
        background: #fff;
        color: #000;
    }

    /* Hamburger Button */
    .menu-toggle {
        display: none;
        background: #000;
        color: #fff;
        border: none;
        font-size: 28px;
        padding: 12px 20px;
        cursor: pointer;
    }

    .menu-toggle:hover {
        background: #111;
    }

    /* Hero Image */
    .hero-image {
        width: 100%;
        height: 450px;
        background-image: url('https://images.unsplash.com/photo-1514119412350-e174d90d280e');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    /* Footer */
    .footer {
        background: #444;
        color: #fff;
        padding: 20px 30px;
    }

    .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
    }

    .footer-left {
        text-align: left;
        line-height: 1.8;
    }

    .footer-right {
        text-align: right;
    }

    .footer-right a {
        color: #4da3ff;
        text-decoration: none;
    }

    .footer-right a:hover {
        text-decoration: underline;
    }

    /* Mobile Navigation */
    @media (max-width: 768px) {

        .menu-toggle {
            display: block;
            width: 100%;
            text-align: left;
        }

        nav ul {
            display: none;
            flex-direction: column;
            width: 100%;
        }

        nav ul.active {
            display: flex;
        }

        nav a {
            width: 100%;
            border-top: 1px solid #222;
        }

        .hero-image {
            height: 250px;
        }

        .footer-content {
            flex-direction: column;
        }

        .footer-right {
            text-align: left;
        }
    }
</style>
</head>

<body>

    <!-- Site Title -->
    <header>
        <div class="site-title">
            Paul Crossley
        </div>

        <!-- Navigation -->
        <nav>
            <button class="menu-toggle" aria-label="Toggle navigation">
                ☰
            </button>

            <ul id="nav-menu">
                <li><a href="https://www.google.com">Home</a></li>
                <li><a href="https://www.google.com">Bio</a></li>
                <li><a href="https://www.google.com">Recordings</a></li>
                <li><a href="https://www.google.com">Live Performances</a></li>
                <li><a href="https://www.google.com">Photographs</a></li>
                <li><a href="https://www.google.com">Videos</a></li>
                <li><a href="https://www.google.com">60th Birthday Recital</a></li>
                <li><a href="https://www.google.com">Writings</a></li>
                <li><a href="https://www.google.com">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Image -->
    <section class="hero-image"></section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">

            <div class="footer-left">
                <div>
                    © 2015 Paul Crossley - Concert Pianist |
                    Paul Crossley - Concert Pianist
                </div>

                <div>
                    02087694471 | London
                </div>
            </div>

            <div class="footer-right">
                Website designed by
                <a href="https://www.bonline.com" target="_blank">
                    bOnline
                </a>
            </div>

        </div>
    </footer>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const toggle = document.querySelector('.menu-toggle');
    const menu = document.getElementById('nav-menu');

    toggle.addEventListener('click', function () {
        menu.classList.toggle('active');
    });

});
</script>

</body>
</html>
